<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} == null ? 'Add User' : 'Edit User'">User Form</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white">
<div class="main p-8 animate-fade-in">
    <h1 class="text-3xl mb-6" th:text="${user.id} == null ? 'Add User' : 'Edit User'"></h1>
    <form th:action="${user.id} == null ? '/users' : '/users/update'" th:object="${user}" method="post" class="grid grid-cols-2 gap-4">
        <div>
            <label>Username</label>
            <input type="text" th:field="*{username}" class="input" />
        </div>
        <div>
            <label>Password</label>
            <input type="password" th:field="*{passwordHash}" class="input" />
        </div>
        <div>
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}" class="input" />
        </div>
        <div>
            <label>Email</label>
            <input type="email" th:field="*{email}" class="input" />
        </div>
        <div>
            <label>Role</label>
            <select th:field="*{role}" class="input">
                <option value="ADMIN">ADMIN</option>
                <option value="STAFF">STAFF</option>
            </select>
        </div>
        <div class="col-span-2">
            <button type="submit" class="btn">Submit</button>
        </div>
    </form>
</div>
<script src="/js/app.js"></script>
</body>
</html>
