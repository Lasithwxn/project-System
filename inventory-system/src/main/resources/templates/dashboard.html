<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 text-white">
<div class="sidebar bg-navy fixed h-full w-64 transform -translate-x-full transition-transform" id="sidebar">
    <ul class="p-4">
        <li><a href="/">Dashboard</a></li>
        <li><a href="/items">Inventory</a></li>
        <li><a href="/users">Users</a></li>
        <li><a href="/transactions">Transactions</a></li>
    </ul>
</div>
<div class="main ml-64 p-8 animate-fade-in">
    <h1 class="text-3xl mb-6">Dashboard</h1>
    <div class="stats grid grid-cols-3 gap-4">
        <div class="card p-4 bg-gray-800 rounded">
            <h2>Total Items</h2>
            <p class="text-4xl" id="totalItems">0</p>
        </div>
        <div class="card p-4 bg-gray-800 rounded">
            <h2>Low Stock</h2>
            <p class="text-4xl" id="lowStock">0</p>
        </div>
        <div class="card p-4 bg-gray-800 rounded">
            <h2>Recent Transactions</h2>
            <p class="text-4xl" id="recentTxns">0</p>
        </div>
    </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
