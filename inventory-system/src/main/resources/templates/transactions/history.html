<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white">
<div class="main p-8 animate-fade-in">
    <h1 class="text-3xl mb-6">Transaction History</h1>
    <form method="get" class="mb-4 grid grid-cols-3 gap-2">
        <input type="text" name="itemId" placeholder="Item ID" value="[[${searchItem}]]" class="input" />
        <input type="text" name="userId" placeholder="User ID" value="[[${searchUser}]]" class="input" />
        <button type="submit" class="btn">Filter</button>
    </form>
    <ul class="timeline">
        <li th:each="t : ${txns}">
            <strong th:text="${t.timestamp}"></strong> -
            <span th:text="${t.type}"></span> of
            <span th:text="${t.quantity}"></span> on item
            <span th:text="${t.itemId}"></span> by user
            <span th:text="${t.userId}"></span>
            <p th:text="${t.notes}"></p>
        </li>
    </ul>
</div>
<script src="/js/app.js"></script>
</body>
</html>
