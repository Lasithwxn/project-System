<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Inventory</title>
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 text-white">
<div class="main p-8 animate-fade-in">
    <h1 class="text-3xl mb-6">Inventory</h1>
    <a href="/items/new" class="btn mb-4">Add Item</a>
    <form method="get" class="mb-4 grid grid-cols-4 gap-2">
        <input type="text" name="name" placeholder="Name" value="[[${searchName}]]" class="input" />
        <input type="text" name="category" placeholder="Category" value="[[${searchCategory}]]" class="input" />
        <select name="status" class="input">
            <option value="" th:selected="${searchStatus} == null">All</option>
            <option value="IN_STOCK" th:selected="${searchStatus} == 'IN_STOCK'">In Stock</option>
            <option value="LOW_STOCK" th:selected="${searchStatus} == 'LOW_STOCK'">Low Stock</option>
            <option value="OUT_OF_STOCK" th:selected="${searchStatus} == 'OUT_OF_STOCK'">Out of Stock</option>
        </select>
        <button type="submit" class="btn">Search</button>
    </form>
    <table class="w-full bg-gray-800 rounded">
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Status</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}" class="hover:bg-gray-700">
            <td th:text="${item.id}"></td>
            <td th:text="${item.itemName}"></td>
            <td th:text="${item.category}"></td>
            <td th:text="${item.quantity}"></td>
            <td>
                <span th:classappend="${item.status}=='IN_STOCK' ? 'badge in' : (${item.status}=='LOW_STOCK' ? 'badge low' : 'badge out')"
                      th:text="${item.status}"></span>
            </td>
            <td>
                <a th:href="@{'/items/edit/' + ${item.id}}" class="btn">Edit</a>
                <a th:href="@{'/items/delete/' + ${item.id}}" class="btn">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="/js/app.js"></script>
</body>
</html>
