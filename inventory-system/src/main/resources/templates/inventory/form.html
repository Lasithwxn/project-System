<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title th:text="${item.id} == null ? 'Add Item' : 'Edit Item'">Item Form</title>
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 text-white">
<div class="main p-8 animate-fade-in">
    <h1 class="text-3xl mb-6" th:text="${item.id} == null ? 'Add Item' : 'Edit Item'"></h1>
    <form th:action="${item.id} == null ? '/items' : '/items/update'" th:object="${item}" method="post" class="grid grid-cols-2 gap-4">
        <div>
            <label>Name</label>
            <input type="text" th:field="*{itemName}" class="input" />
        </div>
        <div>
            <label>Category</label>
            <input type="text" th:field="*{category}" class="input" />
        </div>
        <div>
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" class="input" />
        </div>
        <div>
            <label>Unit Price</label>
            <input type="number" step="0.01" th:field="*{unitPrice}" class="input" />
        </div>
        <div>
            <label>Supplier</label>
            <input type="text" th:field="*{supplier}" class="input" />
        </div>
        <div class="col-span-2">
            <button type="submit" class="btn">Submit</button>
        </div>
    </form>
</div>
<script src="/js/app.js"></script>
</body>
</html>
